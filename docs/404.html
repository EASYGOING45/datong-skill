<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 —— 页面未找到 · 大同 Skill</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-content {
      max-width: 500px;
    }
    .error-num {
      font-family: 'Playfair Display', serif;
      font-size: 8rem;
      font-weight: 700;
      color: var(--color-primary);
      opacity: 0.2;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 0.75rem;
    }
    .error-desc {
      font-size: 0.95rem;
      color: var(--color-text-muted);
      margin-bottom: 2rem;
    }
    .error-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75em 1.75em;
      background: var(--color-primary);
      color: white;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }
    .error-link:hover {
      background: var(--color-primary-dark);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="error-num">404</div>
      <h1 class="error-title">此页不存在</h1>
      <p class="error-desc">您访问的页面已下线或地址有误，请返回首页继续探索。</p>
      <a href="index.html" class="error-link">← 返回首页</a>
    </div>
  </div>
</body>
</html>
