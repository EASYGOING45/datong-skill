name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-ubuntu:
    name: Validate (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run structure validation
        shell: bash
        run: bash tests/validate-structure.sh

  validate-macos:
    name: Validate (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run structure validation
        shell: bash
        run: bash tests/validate-structure.sh

  validate-windows:
    name: Validate (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run structure validation
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File tests/validate-structure.ps1

  json-validate:
    name: Validate JSON configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JSON files
        shell: bash
        run: |
          for f in package.json hooks/hooks.json .claude-plugin/plugin.json .cursor-plugin/plugin.json; do
            python3 -m json.tool "$f" > /dev/null 2>&1 && echo "OK: $f" || echo "FAIL: $f"
          done
