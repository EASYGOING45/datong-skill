name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            shell: bash
          - os: macos-latest
            shell: bash
          - os: windows-latest
            shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate structure (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -e
          echo "=== Running structure validation on ${{ matrix.os }} ==="
          bash tests/validate-structure.sh

      - name: Validate structure (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          echo "=== Running structure validation on Windows ==="
          $errors = 0

          $requiredFiles = @(
            "package.json",
            "LICENSE",
            "README.md",
            "CHANGELOG.md",
            "PLAN.md",
            ".gitignore",
            "hooks\hooks.json",
            ".claude-plugin\plugin.json",
            ".cursor-plugin\plugin.json",
            "skills\tianxia-weigong\SKILL.md",
            "skills\workflows\SKILL.md",
            "agents\five-power-reviewer.md"
          )

          foreach ($f in $requiredFiles) {
            if (!(Test-Path $f)) {
              Write-Host "MISSING: $f"
              $errors++
            } else {
              Write-Host "OK: $f"
            }
          }

          $skills = @(
            "know-hard-act-easy",
            "east-west-synthesis",
            "three-principles-analysis",
            "five-power-checks",
            "power-capability-split",
            "awaken-and-unite",
            "single-stroke-revolution",
            "three-phase-governance",
            "rise-from-defeat",
            "aid-the-weak"
          )

          foreach ($s in $skills) {
            $sk = "skills\$s\SKILL.md"
            if (!(Test-Path $sk)) {
              Write-Host "MISSING: $sk"
              $errors++
            } else {
              Write-Host "OK: $sk"
            }
            $orig = "skills\$s\original-texts.md"
            if (!(Test-Path $orig)) {
              Write-Host "MISSING: $orig"
              $errors++
            } else {
              Write-Host "OK: $orig"
            }
          }

          if ($errors -eq 0) {
            Write-Host "All checks passed!"
            exit 0
          } else {
            Write-Host "Found $errors issue(s)"
            exit 1
          }

      - name: Validate JSON configs
        shell: ${{ matrix.os == 'windows-latest' && 'pwsh' || 'bash' }}
        run: |
          echo "=== Validating JSON configs ==="
          $configs = @("package.json", "hooks/hooks.json", ".claude-plugin/plugin.json", ".cursor-plugin/plugin.json")
          if ('${{ matrix.os }}' -eq 'windows-latest') {
            $configs = @("package.json", "hooks\hooks.json", ".claude-plugin\plugin.json", ".cursor-plugin\plugin.json")
          }
          foreach ($c in $configs) {
            if (Test-Path $c) {
              python -m json.tool $c > $null 2>&1 && Write-Host "OK: $c" || Write-Host "FAIL: $c is not valid JSON"
            }
          }

      - name: Validate SKILL.md YAML frontmatter
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          echo "=== Checking YAML frontmatter ==="
          for skill in know-hard-act-easy east-west-synthesis three-principles-analysis five-power-checks power-capability-split awaken-and-unite single-stroke-revolution three-phase-governance rise-from-defeat aid-the-weak tianxia-weigong workflows; do
            f="skills/$skill/SKILL.md"
            if [ -f "$f" ]; then
              first=$(head -1 "$f")
              if echo "$first" | grep -q "^---"; then
                echo "OK: $f has frontmatter"
              else
                echo "WARN: $f missing YAML frontmatter"
              fi
            fi
          done
